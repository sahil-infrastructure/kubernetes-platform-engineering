services:

  postgres:
    image: postgres:16
    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: YOUR_DB_USER
      POSTGRES_PASSWORD: YOUR_Db_PASSWORD

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U YOUR_DB_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ecom-backend-net

  backend:
    image: ecommerce-backend:1.0.0
    container_name: backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_HOST: postgres
      DB_NAME: ecommerce
      DB_USER: YOUR_DB_USER
      DB_PASSWORD: YOUR_DB_PASSWORD
      DB_PORT: 5432

    ports:
      - "5000:5000"

    networks:
      - ecom-backend-net
      - ecom-frontend-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor

    restart: unless-stopped

    ports:
      - "8081:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

    networks:
      - ecom-backend-net

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    depends_on:
      - cadvisor

    networks:
      - ecom-backend-net

  grafana:
    image: grafana/grafana:12.0.2
    container_name: grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - ecom-backend-net

volumes:
  postgres-data:
  grafana-data:

networks:
  ecom-frontend-net:
  ecom-backend-net:
